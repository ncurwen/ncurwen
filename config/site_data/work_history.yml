rows:
  - company: Info-Tech Research Group
    location: London, Ontario, Canada
    period: Jan 2014 — Present
    summary: Over ten years of full-stack Rails development, from intern to a senior software developer role. Designed and implemented solutions to complex and evolving feature requirements; strong focus on modernization, optimization, and componentization.
    roles:
      - title: Senior Software Developer
        period: Aug 2022 — Present
        bullets:
          - Led Rails modernization to Turbo 8, implementing Stimulus controllers and morphs across the application; reduced frontend complexity and improved page responsiveness
          - Drove adoption of component-driven architecture, establishing a reusable component library that reduced feature development time and improved consistency
          - Partnered with architecture team to help three diagnostic delivery teams align their project solutions and maintain architecture intent alignment
          - Mentored developers on modern Rails and Hotwire patterns

      - title: Software Developer
        period: May 2018 — Jul 2022
        bullets:
          - Architected and built the first external partner API with AWS API Gateway; enabled secure data sharing and integrations with our partners.
          - Designed and implemented HRIS SFTP sync automation; reduced manual data processes for our users
          - Provided technical direction and hands-on support during HRIS client onboarding; ensured smooth integrations and reduced deployment friction
          - Owned features end-to-end — from requirement clarification through design, delivery, and ongoing support
          - Optimized ETL pipeline and bulk processing practices; shifted bottlenecks and enabled larger clients to process higher data volumes concurrently
          - Led solution design from loose requirements; conducted code reviews and mentored team through GitHub PRs

      - title: Junior Software Developer
        period: Jan 2016 — Jan 2017
        bullets:
          - Designed and implemented solutions to complex feature requirements with minimal specification
          - Conducted code reviews and application maintenance via GitHub; supported day-to-day Agile delivery
          - Took over contractor-built policy management proof-of-concept; restructured codebase and architecture to production standards, enabling stable releases

      - title: Software Developer (Internship)
        period: Jan 2014 — Aug 2015 (three semesters)
        bullets:
          - Built diagnostic management platform for Data Driven Research team using Ruby on Rails, MySQL, and JavaScript
          - Set up VMWare-based Linux development environments for team onboarding
          - Collaborated on GitHub-driven workflows; adopted Scrum and Agile practices, delivering features alongside full-time team members

  - company: Buffone IT Inc.
    location: Contract, part-time
    period: Sep 2020 — Jun 2021
    summary: Concurrent part-time contracts — Data Developer and AWS Specialist roles across two enterprise clients.
    roles:
      - title: Data Developer & AWS Specialist
        bullets:
          - "Data: Designed and built custom Talend Cloud ETLs from varied sources; streamlined data integration across client systems"
          - "Data: Built Snowflake data pipelines optimized for high-volume processing; enabled scalable ingestion workflows"
          - "Data: Provisioned and managed artifact repositories, enabling CI/CD automation and release workflows"
          - "AWS: Automated CI/CD across environments using CodePipeline and Lambda; streamlined deployment processes across environments"
          - "AWS: Extended infrastructure-as-code with CloudFormation; audited and fixed legacy stacks to improve maintainability"
          - "AWS: Hardened network security using VPC Reachability Analyzer and security group optimization"

  - company: FranchiseGrade.com
    location: Byron, Ontario, Canada
    period: Jan 2017 — Dec 2017
    summary: Franchise disclosure analytics startup — built data pipeline and web infrastructure for document processing and analysis.
    roles:
      - title: Software Developer
        bullets:
          - Architected and built microservices using Docker, API services, and AWS Lambdas
          - Built Rails web application with RSpec test coverage; designed solutions for data storage and analysis
          - Wrote Python web scrapers to extract documents and metadata
          - Automated PDF extraction and storage using chained AWS Lambdas (Node.js and Python); turned manual input process into a review and edit process
          - Designed event-driven architecture using AWS services (SNS, SQS, Lambda, CloudFormation, ECS); enabled asynchronous document processing and scale

  - company: Freelance Web Developer
    location: London, Ontario, Canada
    period: Mar 2012 — Mar 2014
    summary: Web development and IT support for small businesses while completing studies.
    roles:
      - title: Webmaster & IT Support
        bullets:
          - Built and deployed 3 WordPress and custom-coded websites for small business clients
          - Established hosting infrastructure, email systems, and social media presence across client portfolios
          - Provided IT support and infrastructure management for client networks and home servers
